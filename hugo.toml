baseURL = 'https://txtmix.com/'
#locale = 'en-us'
locale = 'zh'
languageCode = "zh-cn"
hasCJKLanguage = true
defaultContentLanguage = "zh-cn"
title = 'Text Matrix'
theme = "LoveIt"


enableGitInfo = true

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  title = "Text Matrix"
  description = "Text Matrix"
  readingSpeedCJK = 400

  [params.adsense]
    enabled = true
    client = "ca-pub-3883067925168693"
    autoAds = true

  [params.author]
    name = "TextMatrix"

  [params.header.title]
    name = "Text Matrix"

  [params.app]
    title = "Text Matrix"

  [params.footer]
    copyright = false

  [params.home]
    [params.home.profile]
      typeit = false
      subtitle = '''
<span class="hero-console">
  <span class="hero-console-grid"></span>
  <span class="hero-console-noise"></span>
  <span class="hero-wordmark" aria-label="Text Matrix" data-text="TEXT MATRIX">
    <span class="hero-wordmark-text">
      <span class="hero-wordmark-char">T</span>
      <span class="hero-wordmark-char">E</span>
      <span class="hero-wordmark-char">X</span>
      <span class="hero-wordmark-char">T</span>
      <span class="hero-wordmark-gap"></span>
      <span class="hero-wordmark-char">M</span>
      <span class="hero-wordmark-char">A</span>
      <span class="hero-wordmark-char">T</span>
      <span class="hero-wordmark-char">R</span>
      <span class="hero-wordmark-char">I</span>
      <span class="hero-wordmark-char">X</span>
    </span>
  </span>
</span>
'''

[menu]
  [[menu.main]]
    identifier = "news"
    name = "📰 行业快讯"
    url = "/categories/行业快讯/"
    weight = 1
  [[menu.main]]
    identifier = "tech"
    name = "💻 技术笔记"
    url = "/categories/技术笔记/"
    weight = 2
  [[menu.main]]
    identifier = "video"
    name = "🎬 视频精读"
    url = "/categories/视频精读/"
    weight = 3
  [[menu.main]]
    identifier = "thoughts"
    name = "🤔 思考与随笔"
    url = "/categories/思考与随笔/"
    weight = 4
  [[menu.main]]
    identifier = "docs"
    name = "Docs"
    url = "/docs/"
    weight = 5
